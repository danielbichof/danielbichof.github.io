services:
  dev:
    image: hugomods/hugo:exts
    working_dir: /src
    command: hugo server --bind 0.0.0.0 --port 1313 --baseURL http://localhost:1313 --buildDrafts
    ports:
      - "1313:1313"
    volumes:
      - ./:/src

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
